name: sitemap-auto-capture

# AUTO-CAPTURE MODE (Connect API)
# Daily: read the live sitemap from Data Cloud via the official Connect API and,
# if it differs from Git, commit it as a dated snapshot. Safety net for edits
# made directly in the Data Cloud UI. Captures WHAT/WHEN; WHO/WHY are
# unavailable for UI edits because Data Cloud doesn't record them.
#
# SETUP: define repo secrets:
#   SF_INSTANCE_URL    e.g. https://storm-xxxx.my.salesforce.com
#   SF_ACCESS_TOKEN    OAuth/session token (use JWT flow for CI, see README)
#   SF_CONNECTION_ID   the StreamingApp connection ID

on:
  schedule:
    - cron: '0 6 * * *' # daily at 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Check required secrets are set
        env:
          SF_INSTANCE_URL: ${{ secrets.SF_INSTANCE_URL }}
          SF_ACCESS_TOKEN: ${{ secrets.SF_ACCESS_TOKEN }}
          SF_CONNECTION_ID: ${{ secrets.SF_CONNECTION_ID }}
        run: |
          missing=""
          [ -z "$SF_INSTANCE_URL" ] && missing="$missing SF_INSTANCE_URL"
          [ -z "$SF_ACCESS_TOKEN" ] && missing="$missing SF_ACCESS_TOKEN"
          [ -z "$SF_CONNECTION_ID" ] && missing="$missing SF_CONNECTION_ID"
          if [ -n "$missing" ]; then
            echo "::error::Missing repo secret(s):$missing (Settings -> Secrets and variables -> Actions)."
            exit 1
          fi
          echo "All required secrets are set."

      - name: Capture live sitemap if changed
        id: capture
        env:
          SF_INSTANCE_URL: ${{ secrets.SF_INSTANCE_URL }}
          SF_ACCESS_TOKEN: ${{ secrets.SF_ACCESS_TOKEN }}
          SF_CONNECTION_ID: ${{ secrets.SF_CONNECTION_ID }}
        run: |
          set -o pipefail
          node scripts/capture-live.mjs | tee capture.log
          echo "----"
          grep '^CAPTURED_CHANGE=' capture.log | tail -1 >> "$GITHUB_OUTPUT"
          rm -f capture.log

      - name: Show captured diff
        if: steps.capture.outputs.CAPTURED_CHANGE == 'true'
        run: git --no-pager diff -- build/sitemap.js | head -200

      - name: Commit and push the dated snapshot
        if: steps.capture.outputs.CAPTURED_CHANGE == 'true'
        run: |
          git config user.name  "datacloud-sitemap-bot"
          git config user.email "datacloud-sitemap-bot@users.noreply.github.com"
          DATE="$(date -u +%Y-%m-%d)"
          git add build/sitemap.js
          git commit -m "Auto-capture: live sitemap changed on ${DATE}

          Captured from Data Cloud via the Connect API because the live sitemap
          no longer matched Git. This reflects an edit made in the Data Cloud UI
          (outside the normal PR flow).

          NOTE: Data Cloud does not record who made UI edits or why, so this
          snapshot preserves WHAT changed and WHEN, but not WHO/WHY."
          git tag -f "capture-${DATE}"
          git push origin HEAD
          git push -f origin "capture-${DATE}"
          echo "::notice::Captured live change and committed as capture-${DATE}."

      - name: Report no change
        if: steps.capture.outputs.CAPTURED_CHANGE != 'true'
        run: echo "Live sitemap matches Git — nothing to capture."
